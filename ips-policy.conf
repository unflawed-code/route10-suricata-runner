# Suricata IPS Policy Configuration
# 1 = Enabled, 0 = Disabled
IPS_ENABLED=1

# 1 = Inline (IPS/Block), 0 = Passive (IDS only)
IPS_INLINE=1

# Optional advanced feature toggles for the packaged custom runtime.
# 1 = enabled, 0 = disabled.
# Enable the nDPI Suricata plugin for application-aware detection keywords.
ENABLE_NDPI=1
# Enable the WebSocket app-layer parser in the runtime YAML.
ENABLE_WEBSOCKET=1
# Load the managed Route10 WebSocket rules file from rules/route10-websocket.rules.
ENABLE_WEBSOCKET_RULES=1
# Load the managed nDPI bypass pass-rules file from rules/route10-ndpi-bypass.rules,
# including Ookla/Netflix/Zoom examples.
ENABLE_NDPI_BYPASS=1

# 1 = Enabled, 0 = Disabled
# Automatically check for and apply updates to the runner scripts and rules.
ENABLE_AUTO_UPDATE=1

# 1 = Enabled, 0 = Disabled
# Include Pre-releases (Release Candidates) when checking for updates.
ENABLE_BETA_UPDATES=0

# Category Allowlist: Only rules matching these classtypes will be kept.
# ALL other categories are pruned to save RAM.
#
# Emerging Threats classtypes (from classification.config).
#   not-suspicious                - Not Suspicious Traffic
#   unknown                       - Unknown Traffic
#   bad-unknown                   - Potentially Bad Traffic
#   attempted-recon               - Attempted Information Leak
#   successful-recon-limited      - Information Leak
#   successful-recon-largescale   - Large Scale Information Leak
#   attempted-dos                 - Attempted Denial of Service
#   successful-dos                - Denial of Service
#   attempted-user                - Attempted User Privilege Gain
#   unsuccessful-user             - Unsuccessful User Privilege Gain
#   successful-user               - Successful User Privilege Gain
#   attempted-admin               - Attempted Administrator Privilege Gain
#   successful-admin              - Successful Administrator Privilege Gain
#   rpc-portmap-decode            - Decode of an RPC Query
#   shellcode-detect              - Executable code was detected
#   string-detect                 - A suspicious string was detected
#   suspicious-filename-detect    - A suspicious filename was detected
#   suspicious-login              - Attempted login using suspicious username
#   system-call-detect            - A system call was detected
#   tcp-connection                - A TCP connection was detected
#   trojan-activity               - Network Trojan detected
#   unusual-client-port-connection - Client using an unusual port
#   network-scan                  - Detection of a Network Scan
#   denial-of-service             - Denial of Service Attack
#   non-standard-protocol         - Non-standard protocol or event
#   protocol-command-decode       - Generic Protocol Command Decode
#   web-application-activity      - Access to vulnerable web app
#   web-application-attack        - Web Application Attack
#   misc-activity                 - Misc activity
#   misc-attack                   - Misc Attack
#   icmp-event                    - Generic ICMP event
#   inappropriate-content         - Inappropriate Content detected
#   policy-violation              - Potential Corporate Privacy Violation
#   default-login-attempt         - Default username/password attempt
#   targeted-activity             - Targeted Malicious Activity
#   exploit-kit                   - Exploit Kit Activity
#   external-ip-check             - Retrieving External IP Address
#   domain-c2                     - Domain used for C2
#   pup-activity                  - Possibly Unwanted Program
#   credential-theft              - Successful Credential Theft
#   social-engineering            - Possible Social Engineering
#   coin-mining                   - Crypto Currency Mining
#   command-and-control           - Malware C2 Activity
IPS_ALLOWED_CATEGORIES="command-and-control credential-theft social-engineering coin-mining"
